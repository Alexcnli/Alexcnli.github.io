<!DOCTYPE html>
<html>

<head>
    <title>Alex's Github Webpage</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="src/w3schools.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Roboto">
    <link rel="icon" type="image/png" href="meeple180.png">
    <script src="https://kit.fontawesome.com/e357f5b9b7.js" crossorigin="anonymous"></script>

    <style>
        body {
            font-family: "Roboto", sans-serif
        }

        .bar-block .bar-item {
            padding: 16px;
            font-weight: bold;
        }
    </style>
</head>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.10.377/pdf.min.js"></script>
<script>

    // Template
    // <div class="third container margin-bottom">
    //   <a href="/notes/${note.file}" target="_blank">
    //     <img src="src/norway.jpg" alt="Norway" style="width:100%" class="hover-opacity">
    //       <div class="container white">
    //         <p><b>example</b></p>
    //       </div>
    //   </a>
    // </div>
    
    document.addEventListener("DOMContentLoaded", function () {
        fetch('/notes/notes.json')
            .then(response => response.json())
            .then(notes => {
                const content = document.getElementById('content');
                const courses = {};

                // Group notes by course
                notes.forEach(note => {
                    if (!courses[note.course]) {
                        courses[note.course] = [];
                    }
                    courses[note.course].push(note);
                });

                // Create sections for each course
                for (const course in courses) {
                    const section = document.createElement('div');
                    section.id = course;
                    section.className = 'container';

                    const header = document.createElement('h2');
                    header.textContent = `${course}`;
                    section.appendChild(header);

                    const list = document.createElement('ul');
                    list.style.listStyleType = 'none';

                    courses[course].forEach(note => {
                        // Note item container
                        const noteItem = document.createElement('div');
                        noteItem.className = 'third container margin-bottom';

                        // Note link
                        const noteLink = document.createElement('a');
                        const formattedTitle = note.title.replace(/\s+/g, '_'); // Replace spaces with underscores
                        noteLink.href = `/notes/${course}/${formattedTitle}.pdf`;
                        noteLink.target = '_blank';

                        // Cover image
                        const coverImage = document.createElement('img');
                        coverImage.className = 'hover-opacity';
                        coverImage.src = `/notes/img/${course}.png`;
                        coverImage.alt = note.title;
                        coverImage.style.width = '100%';

                        // Note details container
                        const noteDetails = document.createElement('div');
                        noteDetails.className = 'container white';

                        // Note title
                        const noteTitle = document.createElement('p');
                        noteTitle.innerHTML = `<b>${note.title}</b>`;

                        noteDetails.appendChild(noteTitle);
                        noteLink.appendChild(coverImage);
                        noteLink.appendChild(noteDetails);
                        noteItem.appendChild(noteLink);
                        list.appendChild(noteItem);
                    });

                    section.appendChild(list);
                    content.appendChild(section);
                }
            })
            .catch(error => console.error('Error fetching notes:', error));
    });


    // Open and close the sidebar on medium and small screens
    function sidebar_open() {
        document.getElementById("mySidebar").style.display = "block";
        document.getElementById("myOverlay").style.display = "block";
    }

    function sidebar_close() {
        document.getElementById("mySidebar").style.display = "none";
        document.getElementById("myOverlay").style.display = "none";
    }

    // Change style of top container on scroll
    window.onscroll = function () { myFunction() };
    function myFunction() {
        if (document.body.scrollTop > 80 || document.documentElement.scrollTop > 80) {
            document.getElementById("myTop").classList.add("card-4", "animate-opacity");
            document.getElementById("myIntro").classList.add("show-inline-block");
        } else {
            document.getElementById("myIntro").classList.remove("show-inline-block");
            document.getElementById("myTop").classList.remove("card-4", "animate-opacity");
        }
    }

    // Accordions
    function myAccordion(id) {
        var x = document.getElementById(id);
        if (x.className.indexOf("show") == -1) {
            x.className += " show";
            x.previousElementSibling.className += " theme";
        } else {
            x.className = x.className.replace("show", "");
            x.previousElementSibling.className =
                x.previousElementSibling.className.replace(" theme", "");
        }
    }
</script>

<body>
    <!-- Sidebar/menu -->
    <nav class="sidebar bar-block collapse animate-left card" style="z-index:3;width:250px;" id="mySidebar">
        <br>
        <div class="container">
            <img src="src/meeple640.png" style="width:50%;">
            <a href="#" onclick="sidebar_close()" class="hide-large right jumbo padding hover-grey" title="close menu">
                <i class="fa fa-remove" aria-hidden="true"></i>
            </a>
        </div>
        <div class="bar-block">
            <a href="#notes" onclick="sidebar_close()" class="bar-item button">
                <i class="fa-solid fa-book fa-fw margin-right" aria-hidden="true"></i>My Notes</a>

            <a class="bar-item button" onclick="myAccordion('uds')" href="javascript:void(0)">
                <i class="fa-solid fa-book fa-fw margin-right" aria-hidden="true"></i>UdS Courses
                <i class="fa fa-caret-down" aria-hidden="true"></i></a>
            <div id="uds" class="hide" style="padding:0px 0px 0px 32px">
                <a href="#cryptography" onclick="sidebar_close()" class="bar-item button">
                    <i class="fa-solid fa-book-open fa-fw margin-right" aria-hidden="true"></i>Cryptography</a>
                <a href="#PV" onclick="sidebar_close()" class="bar-item button">
                    <i class="fa-solid fa-book-open fa-fw margin-right" aria-hidden="true"></i>PV</a>
            </div>
            <a href="#CUHK" onclick="sidebar_close()" class="bar-item button">
                <i class="fa-solid fa-book fa-fw margin-right" aria-hidden="true"></i>CUHK Courses</a>

            <a href="AboutMe.html" onclick="sidebar_close()" class="bar-item button">
                <i class="fa fa-user fa-fw margin-right" aria-hidden="true"></i>My Profile</a>

            <a class="bar-item button" onclick="myAccordion('work')" href="javascript:void(0)">
                <i class="fa fa-diagram-project fa-fw margin-right" aria-hidden="true"></i>Recent Work
                <i class="fa fa-caret-down" aria-hidden="true"></i></a>
            <div id="work" class="hide" style="padding:0px 0px 0px 32px">
                <a href="https://github.com/Alexcnli/Azul_Test" onclick="sidebar_close()" class="bar-item button">
                    <i class="fa-solid fa-link fa-fw margin-right" aria-hidden="true"></i>Azul (C++)</a>
                <a href="https://github.com/Alexcnli/hanabi_simulator" onclick="sidebar_close()"
                    class="bar-item button">
                    <i class="fa-solid fa-link fa-fw margin-right" aria-hidden="true"></i>Hanabi (Python)</a>
            </div>
        </div>
    </nav>

    <!-- Overlay effect when opening sidebar on small screens -->
    <div class="overlay hide-large animate-opacity" onclick="sidebar_close()" style="cursor:pointer" id="myOverlay">
    </div>

    <!-- !PAGE CONTENT! -->
    <div class="main" style="margin-left:250px;">

        <!-- Hidden top bar -->
        <div id="myTop" class="container top theme large">
            <a href="#"><img src="meeple640.png" style="width:50px;"
                    class="circle right margin hide-large hover-opacity"></a>
            <p><i class="fa fa-bars button teal hide-large xlarge" onclick="sidebar_open()" aria-hidden="true"></i>
                <span id="myIntro" class="hide">Alex's Github Webpage</span>
            </p>
        </div>

        <!-- Header -->
        <header id="MainPage" class="container theme" style="padding:64px 32px 16px">
            <div class="container">
                <h1><b>Alex's Github Webpage</b></h1>
            </div>
        </header>

        <div class="container" style="padding:32px 32px" id="content">
        </div>
    </div>

    <footer class="container teal center margin-top">
        <p>Powered by <a href="https://www.w3schools.com/w3css/default.asp" target="_blank">w3.css</a></p>
    </footer>
</body>

</html>
