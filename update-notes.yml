name: Update Notes

on:
  push:
    paths:
      - 'notes/**'  # Trigger workflow on changes in the notes folder
  schedule:
    - cron: '0 0 * * *'  # Optionally, schedule the workflow to run daily

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v2

    - name: Set up Node.js
      uses: actions/setup-node@v2
      with:
        node-version: '14'

    - name: Install dependencies
      run: npm install

    - name: Build website
      run: npm run build  # Modify this if you use a different build command

    - name: Deploy to GitHub Pages
      uses: peaceiris/actions-gh-pages@v3
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./dist  # Change this to your build output directory
